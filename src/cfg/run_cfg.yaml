# =============================================================================
# EXPERIMENT CONFIGURATION
# =============================================================================

exp_cfg:
  exp_id: "test_exp"
  seed: 37
  trial_run: false

global_cfg:
  domain: personal finance
  output_dir: base_output/
  pipeline_type: base

# =============================================================================
# GENERATION PIPELINE
# =============================================================================

# LLM for generation stages (1-5)
scientist_llm:
  name: o4-mini
  provider: openai
  generation_cfg:
    capability_generation:
      temperature: 0.7
      max_tokens: 16384
      seed: 42
    task_generation:
      temperature: 0.7
      max_tokens: 32768
      seed: 42
    task_solve:
      temperature: 0.7
      max_tokens: 2048
      seed: 42
    task_verify:
      temperature: 0.7
      max_tokens: 2048
      seed: 42

# Stage control
stage: "all"  # Which stage to run: 0, 1, 2, 3, 4, 5, or "all"

# Stage tags (for running individual stages or resuming)
areas_tag: null           # Stage 1 output tag (required for stage 2 standalone)
capabilities_tag: null    # Stage 2 output tag (required for stage 3 standalone)
tasks_tag: null           # Stage 3 output tag (required for stage 4 standalone)
solution_tag: null        # Stage 4 output tag (required for stage 5 standalone)
validation_tag: null      # Stage 5 output tag (required for eval pipeline)
eval_tag: null            # Eval Stage 1 output tag (required for eval stage 2, optional for stage 1 resume)

# Stage 1: Area generation
areas_cfg:
  num_areas: 2

# Stage 2: Capability generation
capabilities_cfg:
  num_capabilities: 4
  num_capabilities_buffer: 0.1
  num_gen_capabilities_per_run: 1

# Embedding config (used for capability filtering in Stage 2)
embedding_cfg:
  embedding_model: text-embedding-3-small
  embedding_size: 1536
  filtering_similarity_threshold: 0.85

# Stage 3: Task generation
task_generation_cfg:
  tasks_per_blueprint: 1
  min_subtopics: 1
  max_subtopics: 1

# =============================================================================
# EVALUATION PIPELINE
# =============================================================================

eval_cfg:
  # LLMs to evaluate (required)
  subject_llms:
    - name: gemma-3-12b-it
      provider: hf_local
      model_path: /model-weights/gemma-3-12b-it
      inference_backend: vllm
      trust_remote_code: true
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 1
      batch_size: 8
      generation_cfg:
        temperature: 0.0
        max_tokens: 8192
    - name: gemma-3-27b-it
      provider: hf_local
      model_path: /model-weights/gemma-3-27b-it
      inference_backend: vllm
      trust_remote_code: true
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 1
      batch_size: 4
      generation_cfg:
        temperature: 0.0
        max_tokens: 8192
    - name: qwen-3-32b
      provider: hf_local
      model_path: /model-weights/Qwen3-32B/
      inference_backend: vllm
      trust_remote_code: true
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 1
      batch_size: 4
      generation_cfg:
        temperature: 0.0
        max_tokens: 8192
    - name: qwen-3-8b
      provider: hf_local
      model_path: /model-weights/Qwen3-32B/
      inference_backend: vllm
      trust_remote_code: true
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 1
      batch_size: 8
      generation_cfg:
        temperature: 0.0
        max_tokens: 8192
    - name: deepseek-r1-distill-qwen-32b
      provider: hf_local
      model_path: /projects/DeepLesion/model_weights/deepseek-r1-distill-qwen-32b
      inference_backend: vllm
      trust_remote_code: true
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 1
      batch_size: 4
      generation_cfg:
        temperature: 0.0
        max_tokens: 8192
    - name: deepseek-r1-distill-qwen-14b
      provider: hf_local
      model_path: /projects/DeepLesion/model_weights/deepseek-r1-distill-qwen-14b
      inference_backend: vllm
      trust_remote_code: true
      gpu_memory_utilization: 0.9
      tensor_parallel_size: 1
      batch_size: 8
      generation_cfg:
        temperature: 0.0
        max_tokens: 8192

  # Judge LLM for scoring (required)
  judge_llm:
    name: gpt-4o-mini
    provider: openai
    base_url: https://api.openai.com/v1
    # For API judges, we interpret batch_size as "max concurrent async requests".
    batch_size: 24
    generation_cfg:
      max_tokens: 8
      temperature: 0.0

# =============================================================================
# HYDRA
# =============================================================================

defaults:
  - _self_
  - capabilities: personal_finance
